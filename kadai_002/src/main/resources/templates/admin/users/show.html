<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
	<div th:replace="~{fragment :: meta}"></div>

	<div th:replace="~{fragment :: styles}"></div>

	<title>会員詳細</title>
</head>

<body>
	<div class="nagoyameshi-wrapper">
		<!-- ヘッダー -->
		<div th:replace="~{fragment :: header}"></div>

		<main>
			<div class="container pb-5 nagoyameshi-container">
				<div class="row justify-content-center">
					<div class="col-xl-5 col-lg-6 col-md-8">
						<nav class="my-3" style="--bs-breadcrumb-divider: '>';" aria-label="breadcrumb">
							<ol class="breadcrumb mb-0">
								<li class="breadcrumb-item"><a th:href="@{/admin/users}">会員一覧</a></li>
								<li class="breadcrumb-item active" aria-current="page">会員詳細</li>
							</ol>
						</nav>

						<div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}">
						</div>

						<h1 class="mb-3 text-center" th:text="${user.getName()}"></h1>


						<div class="container mb-4">
							<div class="row pb-2 mb-2 border-bottom">
								<div class="col-4">
									<span class="fw-bold">ID</span>
								</div>

								<div class="col">
									<span th:text="${user.getId()}"></span>
								</div>
							</div>

							<div class="row pb-2 mb-2 border-bottom">
								<div class="col-4">
									<span class="fw-bold">氏名</span>
								</div>

								<div class="col">
									<span th:text="${user.getName()}"></span>
								</div>
							</div>

							<div class="row pb-2 mb-2 border-bottom">
								<div class="col-4">
									<span class="fw-bold">フリガナ</span>
								</div>

								<div class="col">
									<span th:text="${user.getFurigana()}"></span>
								</div>
							</div>
							<div class="row pb-2 mb-2 border-bottom">
								<div class="col-4">
									<span class="fw-bold">メールアドレス</span>
								</div>

								<div class="col">
									<span th:text="${user.getEmail()}"></span>
								</div>
							</div>

							<div class="row pb-2 mb-2 border-bottom">
								<div class="col-4">
									<span class="fw-bold">電話番号</span>
								</div>

								<div class="col">
									<span th:text="${user.getPhoneNumber()}"></span>
								</div>
							</div>

							<div class="row pb-2 mb-2 border-bottom">
								<div class="col-4">
									<span class="fw-bold">生年月日</span>
								</div>

								<div class="col">
									<span th:text="${user.getDateOfBirth()}"></span>
								</div>
							</div>

							<div class="row pb-2 mb-2 border-bottom">
								<div class="col-4">
									<span class="fw-bold">職業</span>
								</div>

								<div class="col">
									<span th:text="${user.getOccupation()}"></span>
								</div>
							</div>

							<div class="row pb-2 mb-2 border-bottom">
								<div class="col-4">
									<span class="fw-bold">会員種別</span>
								</div>

								<div class="col">
									<span class="badge bg-success" th:if="${user.paidMember}">
										有料会員
									</span>
									<span class="badge bg-secondary" th:unless="${user.paidMember}">
										無料会員
									</span>
								</div>
							</div>

							<div class="row pb-2 mb-2 border-bottom">
								<div class="col-4">
									<span class="fw-bold">ロール</span>
								</div>

								<div class="col">
									<span th:text="${user.role.name}"></span>
								</div>
							</div>

							<div class="row pb-2 mb-2 border-bottom">
								<div class="col-4">
									<span class="fw-bold">登録日時</span>
								</div>

								<div class="col">
									<span th:text="${#dates.format(user.createdAt, 'yyyy/MM/dd HH:mm')}"></span>
								</div>
							</div>

						</div>

						<div class="mt-4 d-flex gap-2">
							<a th:href="@{/admin/users/{id}/edit(id=${user.id})}" class="btn btn-primary">編集</a>

							<form th:action="@{/admin/users/{id}/delete(id=${user.id})}" method="post">
								<button class="btn btn-danger" onclick="return confirm('削除しますか？')">
									削除
								</button>
							</form>

							<div th:if="${!user.enabled}">
								<form method="post" th:action="@{/admin/users/__${user.id}__/resend}">
									<button class="btn btn-outline-primary">
										仮登録メール再送
									</button>
								</form>
							</div>
						</div>
						
					</div>
				</div>
			</div>
		</main>

		<!-- フッター -->
		<div th:replace="~{fragment :: footer}"></div>
	</div>

	<div th:replace="~{fragment :: scripts}"></div>
</body>

</html>
