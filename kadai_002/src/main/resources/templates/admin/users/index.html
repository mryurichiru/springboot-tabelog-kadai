<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
	<div th:replace="~{fragment :: meta}"></div>

	<div th:replace="~{fragment :: styles}"></div>

	<title>会員一覧</title>
</head>

<body>
	<div class="nagoyameshi-wrapper">
		<!-- ヘッダー -->
		<div th:replace="~{fragment :: header}"></div>

		<main>
			<div class="container pt-4 pb-5 nagoyameshi-container">
				<div class="row justify-content-center">
					<div class="col-xxl-9 col-xl-10 col-lg-11">

						<h1 class="mb-4 text-center">会員一覧</h1>

						<form method="get" th:action="@{/admin/users}" class="row g-3 mb-3">

						    <!-- 氏名・フリガナ -->
						    <div class="col-md-3">
						        <input type="text"
						               class="form-control"
						               name="name"
						               th:value="${name}"
						               placeholder="氏名・フリガナ">
						    </div>

						    <!-- メール -->
						    <div class="col-md-3">
						        <input type="text"
						               class="form-control"
						               name="email"
						               th:value="${email}"
						               placeholder="メールアドレス">
						    </div>

						    <!-- 電話番号 -->
						    <div class="col-md-2">
						        <input type="text"
						               class="form-control"
						               name="phoneNumber"
						               th:value="${phoneNumber}"
						               placeholder="電話番号">
						    </div>

						    <!-- 会員種別 -->
						    <div class="col-md-2">
						        <select class="form-select" name="membershipType">
						            <option value="">すべて</option>
						            <option value="0" th:selected="${membershipType == 0}">
						                無料会員
						            </option>
						            <option value="1" th:selected="${membershipType == 1}">
						                有料会員
						            </option>
						        </select>
						    </div>

						    <!-- 検索 -->
						    <div class="col-md-1">
						        <button type="submit"
						                class="btn nagoyameshi-btn text-white w-100">
						            検索
						        </button>
						    </div>

						    <!-- CSV -->
						    <div class="col-md-1">
						        <a th:href="@{/admin/users/csv(
						                name=${name},
						                email=${email},
						                phoneNumber=${phoneNumber},
						                membershipType=${membershipType})}"
						           class="btn btn-success w-100">
						            CSV
						        </a>
						    </div>

						</form>

						<div th:if="${successMessage}" class="alert alert-info">
							<span th:text="${successMessage}"></span>
						</div>

						<table class="table">
							<thead>
								<tr>
									<th scope="col">ID</th>
									<th scope="col">氏名</th>
									<th scope="col">フリガナ</th>
									<th scope="col">メールアドレス</th>
									<th scope="col">会員種別</th>
									<th scope="col">ロール</th>
									<th scope="col">登録日時</th>

									<th scope="col"></th>
								</tr>
							</thead>
							<tbody>
								<tr th:each="user : ${userPage}">
									<td th:text="${user.getId()}"></td>
									<td th:text="${user.getName()}"></td>
									<td th:text="${user.getFurigana()}"></td>
									<td th:text="${user.getEmail()}"></td>
									<td>
										<span class="badge bg-success" th:if="${user.paidMember}">
											有料会員
										</span>
										<span class="badge bg-secondary" th:unless="${user.paidMember}">
											無料会員
										</span>
									</td>
									<td th:text="${user.role.name}"></td>
									<td th:text="${#dates.format(user.createdAt, 'yyyy/MM/dd HH:mm')}"></td>

									<td><a th:href="@{/admin/users/__${user.getId()}__}">詳細</a></td>
								</tr>
							</tbody>
						</table>

						<!-- ページネーション -->
						<div th:if="${userPage.getTotalPages() > 1}" class="d-flex justify-content-center">
							<nav aria-label="会員一覧ページ">
								<ul class="pagination">
									<li class="page-item">
										<span th:if="${userPage.isFirst()}" class="page-link disabled">前</span>
										<a th:unless="${userPage.isFirst()}" th:href="@{/admin/users(
										        page=${userPage.getNumber()-1},
										        name=${name},
										        email=${email},
										        phoneNumber=${phoneNumber},
										        membershipType=${membershipType})}" class="page-link nagoyameshi-page-link">
											前
										</a>
									</li>
									<li th:each="i : ${#numbers.sequence(0, userPage.getTotalPages() - 1)}"
										class="page-item">
										<span th:if="${i == userPage.getNumber()}"
											class="page-link active nagoyameshi-active" th:text="${i + 1}"></span>
										<a th:unless="${i == userPage.getNumber()}" th:href="@{/admin/users(
											        page=${i},
											        name=${name},
											        email=${email},
											        phoneNumber=${phoneNumber},
											        membershipType=${membershipType})}" class="page-link nagoyameshi-page-link" th:text="${i + 1}">
										</a>
									</li>
									<li class="page-item">
										<span th:if="${userPage.isLast()}" class="page-link disabled">次</span>
										<a th:unless="${userPage.isLast()}" th:href="@{/admin/users(
										        page=${userPage.getNumber()+1},
										        name=${name},
										        email=${email},
										        phoneNumber=${phoneNumber},
										        membershipType=${membershipType})}" class="page-link nagoyameshi-page-link">
											次
										</a>
									</li>
								</ul>
							</nav>
						</div>
					</div>
				</div>
			</div>
		</main>

		<!-- フッター -->
		<div th:replace="~{fragment :: footer}"></div>
	</div>

	<div th:replace="~{fragment :: scripts}"></div>
</body>

</html>
