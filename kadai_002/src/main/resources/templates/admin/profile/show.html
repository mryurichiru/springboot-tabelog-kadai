<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <div th:replace="~{fragment :: meta}"></div>
    <div th:replace="~{fragment :: styles}"></div>

    <title>管理者プロフィール</title>
</head>

<body>

<div class="nagoyameshi-wrapper">

    <div th:replace="~{fragment :: header}"></div>

    <main>

        <div class="container py-5 nagoyameshi-container">

            <div class="row justify-content-center">

                <div class="col-lg-6">

                    <nav class="mb-4">
                        <ol class="breadcrumb">
                            <li class="breadcrumb-item">
                                <a th:href="@{/admin}">
                                    管理ダッシュボード
                                </a>
                            </li>

                            <li class="breadcrumb-item active">
                                管理者プロフィール
                            </li>
                        </ol>
                    </nav>

                    <div class="card shadow-sm">

                        <div class="card-header">
                            <h3 class="mb-0">
                                管理者プロフィール
                            </h3>
                        </div>

                        <div class="card-body">

                            <table class="table">

                                <tr>
                                    <th width="35%">氏名</th>
                                    <td th:text="${user.name}"></td>
                                </tr>

                                <tr>
                                    <th>メールアドレス</th>
                                    <td th:text="${user.email}"></td>
                                </tr>

                                <tr>
                                    <th>ロール</th>
                                    <td th:text="${user.role.name}"></td>
                                </tr>

                                <tr>
                                    <th>登録日時</th>
                                    <td th:text="${#dates.format(user.createdAt,'yyyy/MM/dd HH:mm')}"></td>
                                </tr>

                            </table>

                            <div class="d-flex justify-content-center gap-3 mt-4">

                                <a th:href="@{/admin/profile/edit}"
                                   class="btn nagoyameshi-btn text-white">
                                    プロフィール編集
                                </a>

								<a th:href="@{/admin/profile/password/edit}"
								   class="btn btn-outline-secondary">
								    パスワード変更
								</a>

                            </div>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </main>

    <div th:replace="~{fragment :: footer}"></div>

</div>

<div th:replace="~{fragment :: scripts}"></div>

</body>
</html>
