<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <div th:replace="~{fragment :: meta}"></div>
    <div th:replace="~{fragment :: styles}"></div>

    <title>管理者プロフィール編集</title>
</head>

<body>

<div class="nagoyameshi-wrapper">

    <div th:replace="~{fragment :: header}"></div>

    <main>

        <div class="container py-5 nagoyameshi-container">

            <div class="row justify-content-center">

                <div class="col-lg-8">

                    <nav class="mb-4">
                        <ol class="breadcrumb">
                            <li class="breadcrumb-item">
                                <a th:href="@{/admin}">
                                    管理ダッシュボード
                                </a>
                            </li>

                            <li class="breadcrumb-item">
                                <a th:href="@{/admin/profile}">
                                    管理者プロフィール
                                </a>
                            </li>

                            <li class="breadcrumb-item active">
                                編集
                            </li>
                        </ol>
                    </nav>

                    <div class="card shadow-sm">

                        <div class="card-header">
                            <h3 class="mb-0">
                                管理者プロフィール編集
                            </h3>
                        </div>

                        <div class="card-body">

                            <form method="post"
                                  th:action="@{/admin/profile/update}"
                                  th:object="${adminProfileEditForm}">

                                <input type="hidden" th:field="*{id}">

                                <div class="mb-3">
                                    <label class="form-label">氏名</label>
                                    <input type="text"
                                           class="form-control"
                                           th:field="*{name}">
                                    <div class="text-danger small"
                                         th:errors="*{name}"></div>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label">フリガナ</label>
                                    <input type="text"
                                           class="form-control"
                                           th:field="*{furigana}">
                                    <div class="text-danger small"
                                         th:errors="*{furigana}"></div>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label">メールアドレス</label>
                                    <input type="email"
                                           class="form-control"
                                           th:field="*{email}">
                                    <div class="text-danger small"
                                         th:errors="*{email}"></div>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label">電話番号</label>
                                    <input type="text"
                                           class="form-control"
                                           th:field="*{phoneNumber}">
                                </div>

                                <div class="mb-3">
                                    <label class="form-label">生年月日</label>
                                    <input type="date"
                                           class="form-control"
                                           th:field="*{dateOfBirth}">
                                </div>

                                <div class="mb-4">
                                    <label class="form-label">職業</label>
                                    <input type="text"
                                           class="form-control"
                                           th:field="*{occupation}">
                                </div>

                                <div class="d-flex justify-content-center gap-3">

                                    <button type="submit"
                                            class="btn nagoyameshi-btn text-white">
                                        更新
                                    </button>

                                    <a th:href="@{/admin/profile}"
                                       class="btn btn-outline-secondary">
                                        キャンセル
                                    </a>

                                </div>

                            </form>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </main>

    <div th:replace="~{fragment :: footer}"></div>

</div>

<div th:replace="~{fragment :: scripts}"></div>

</body>
</html>
