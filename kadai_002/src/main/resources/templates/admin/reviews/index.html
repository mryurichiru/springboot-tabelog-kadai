<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <div th:replace="~{fragment :: meta}"></div>
    <div th:replace="~{fragment :: styles}"></div>

    <title>レビュー一覧</title>
</head>

<body>

<div class="nagoyameshi-wrapper">

    <div th:replace="~{fragment :: header}"></div>

    <main>

        <div class="container py-5 nagoyameshi-container">

            <div class="row justify-content-center">

                <div class="col-xl-10">

                    <h1 class="mb-4 text-center">
                        レビュー一覧
                    </h1>

                    <table class="table table-hover align-middle">

                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>店舗</th>
                                <th>投稿者</th>
                                <th>評価</th>
                                <th>投稿日</th>
                                <th></th>
                            </tr>
                        </thead>

                        <tbody>

                            <tr th:each="review : ${reviewPage}">

                                <td th:text="${review.id}"></td>

								<td>
								    <a th:href="@{/admin/shops/{id}(id=${review.shop.id})}"
								       th:text="${review.shop.name}">
								    </a>
								</td>

                                <td th:text="${review.user.name}"></td>

								<td>
								    <span th:each="i : ${#numbers.sequence(1,5)}">
								        <i th:class="${i <= review.rating}
								                     ? 'bi bi-star-fill text-warning'
								                     : 'bi bi-star text-secondary'"></i>
								    </span>
								</td>

                                <td th:text="${#dates.format(review.createdAt,'yyyy/MM/dd HH:mm')}"></td>

                                <td>
                                    <a th:href="@{/admin/reviews/{id}(id=${review.id})}">
                                        詳細
                                    </a>
                                </td>

                            </tr>

                        </tbody>

                    </table>

                    <!-- ページネーション -->
                    <div th:if="${reviewPage.totalPages > 1}"
                         class="d-flex justify-content-center">

                        <nav>

                            <ul class="pagination">

                                <li class="page-item">

                                    <a class="page-link"
                                       th:if="${!reviewPage.first}"
                                       th:href="@{/admin/reviews(page=${reviewPage.number-1})}">
                                        前
                                    </a>

                                    <span class="page-link disabled"
                                          th:if="${reviewPage.first}">
                                        前
                                    </span>

                                </li>

                                <li class="page-item"
                                    th:each="i : ${#numbers.sequence(0, reviewPage.totalPages-1)}">

                                    <span class="page-link active"
                                          th:if="${i == reviewPage.number}"
                                          th:text="${i+1}">
                                    </span>

                                    <a class="page-link"
                                       th:unless="${i == reviewPage.number}"
                                       th:href="@{/admin/reviews(page=${i})}"
                                       th:text="${i+1}">
                                    </a>

                                </li>

                                <li class="page-item">

                                    <a class="page-link"
                                       th:if="${!reviewPage.last}"
                                       th:href="@{/admin/reviews(page=${reviewPage.number+1})}">
                                        次
                                    </a>

                                    <span class="page-link disabled"
                                          th:if="${reviewPage.last}">
                                        次
                                    </span>

                                </li>

                            </ul>

                        </nav>

                    </div>

                </div>

            </div>

        </div>

    </main>

    <div th:replace="~{fragment :: footer}"></div>

</div>

<div th:replace="~{fragment :: scripts}"></div>

</body>
</html>
