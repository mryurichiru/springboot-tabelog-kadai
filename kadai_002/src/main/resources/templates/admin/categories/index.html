<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <div th:replace="~{fragment :: meta}"></div>
    <div th:replace="~{fragment :: styles}"></div>

    <title>カテゴリ一覧</title>
</head>

<body>
<div class="nagoyameshi-wrapper">

    <!-- ヘッダー -->
    <div th:replace="~{fragment :: header}"></div>

    <main>
        <div class="container pt-4 pb-5 nagoyameshi-container">

            <div class="row justify-content-center">
                <div class="col-xl-8 col-lg-10">

                    <!-- タイトル -->
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h1 class="mb-0">カテゴリ一覧</h1>

                        <a th:href="@{/admin/categories/create}"
                           class="btn text-white nagoyameshi-btn">
                            ＋ カテゴリ登録
                        </a>
                    </div>

                    <!-- メッセージ -->
                    <div th:if="${successMessage}"
                         class="alert alert-info">
                        <span th:text="${successMessage}"></span>
                    </div>

                    <!-- 一覧 -->
                    <table class="table table-hover align-middle">

                        <thead class="table-light">
                        <tr>
                            <th style="width:80px;">ID</th>
                            <th>カテゴリ名</th>
                            <th style="width:180px;"></th>
                        </tr>
                        </thead>

                        <tbody>

                        <tr th:each="category : ${categoryList}">

                            <td th:text="${category.id}"></td>

                            <td th:text="${category.name}"></td>

                            <td class="text-end">

                                <a th:href="@{/admin/categories/{id}/edit(id=${category.id})}"
                                   class="btn btn-outline-primary btn-sm">
                                    編集
                                </a>

                                <form method="post"
                                      th:action="@{/admin/categories/{id}/delete(id=${category.id})}"
                                      class="d-inline"
                                      onsubmit="return confirm('このカテゴリを削除しますか？');">

                                    <button class="btn btn-outline-danger btn-sm">
                                        削除
                                    </button>

                                </form>

                            </td>

                        </tr>

                        <tr th:if="${#lists.isEmpty(categoryList)}">
                            <td colspan="3" class="text-center text-muted py-4">
                                カテゴリが登録されていません。
                            </td>
                        </tr>

                        </tbody>

                    </table>

                </div>
            </div>

        </div>
    </main>

    <!-- フッター -->
    <div th:replace="~{fragment :: footer}"></div>

</div>

<div th:replace="~{fragment :: scripts}"></div>

</body>
</html>
