<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org">

<head>
    <div th:replace="~{fragment :: meta}"></div>
    <div th:replace="~{fragment :: styles}"></div>

    <title>カテゴリ編集</title>
</head>

<body>

<div class="nagoyameshi-wrapper">

    <div th:replace="~{fragment :: header}"></div>

    <main>
        <div class="container pt-4 pb-5 nagoyameshi-container">

            <div class="row justify-content-center">
                <div class="col-lg-6">

                    <nav class="mb-4">
                        <ol class="breadcrumb">
                            <li class="breadcrumb-item">
                                <a th:href="@{/admin/categories}">
                                    カテゴリ一覧
                                </a>
                            </li>
                            <li class="breadcrumb-item active">
                                カテゴリ編集
                            </li>
                        </ol>
                    </nav>

                    <h1 class="text-center mb-4">
                        カテゴリ編集
                    </h1>

                    <form method="post"
                          th:action="@{/admin/categories/{id}/update(id=*{id})}"
                          th:object="${categoryEditForm}">

                        <input type="hidden" th:field="*{id}">

                        <div class="mb-3">
                            <label class="form-label fw-bold">
                                カテゴリ名
                            </label>

                            <input
                                class="form-control"
                                type="text"
                                th:field="*{name}">

                            <div class="text-danger"
                                 th:errors="*{name}">
                            </div>
                        </div>

                        <div class="d-flex justify-content-between mt-4">

                            <a th:href="@{/admin/categories}"
                               class="btn btn-secondary">
                                戻る
                            </a>

                            <div>
                                <button type="submit"
                                        class="btn text-white nagoyameshi-btn">
                                    更新
                                </button>

                                <button type="submit"
                                        class="btn btn-danger"
                                        th:formaction="@{/admin/categories/{id}/delete(id=*{id})}"
                                        onclick="return confirm('このカテゴリを削除しますか？');">
                                    削除
                                </button>
                            </div>

                        </div>

                    </form>

                </div>
            </div>

        </div>
    </main>

    <div th:replace="~{fragment :: footer}"></div>

</div>

<div th:replace="~{fragment :: scripts}"></div>

</body>
</html>
