<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
	<!-- meta要素の部品化 -->
	<div th:fragment="meta" th:remove="tag">
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1">
	</div>

	<!-- favicon-->
		<link rel="icon" th:href="@{/favicon.ico}" type="image/x-icon">

	<!-- link要素の部品化 -->
	<div th:fragment="styles" th:remove="tag">
		<!-- Bootstrap -->
		<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet"
			integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">

			<!-- Google Fonts -->
			<link rel="preconnect" href="https://fonts.googleapis.com">
			<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
			<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500&display=swap" rel="stylesheet">

			<!-- Bootstrap Icons -->
			<link rel="stylesheet"
			      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

			<link th:href="@{/css/style.css}" rel="stylesheet">
	</div>

	<title>部品化用のHTMLファイル</title>
</head>

<body>
	<!-- ヘッダーの部品化 -->
	<div th:fragment="header" th:remove="tag">
		<nav class="navbar navbar-expand-md navbar-light bg-white shadow-sm nagoyameshi-navbar">
			<div class="container nagoyameshi-container">
				<!-- 管理者 -->
				<a class="navbar-brand"
				   th:href="@{/admin}"
				   sec:authorize="hasRole('ROLE_ADMIN')">

				    <img class="nagoyameshi-logo me-1"
				         th:src="@{/images/logo.png}"
				         alt="NAGOYAMESHI">

				</a>

				<!-- 一般ユーザー・未ログイン -->
				<a class="navbar-brand"
				   th:href="@{/}"
				   sec:authorize="!hasRole('ROLE_ADMIN')">

				    <img class="nagoyameshi-logo me-1"
				         th:src="@{/images/logo.png}"
				         alt="NAGOYAMESHI">

				</a>

				<button class="navbar-toggler" type="button" data-bs-toggle="collapse"
					data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent"
					aria-expanded="false" aria-label="Toggle navigation">
					<span class="navbar-toggler-icon"></span>
				</button>

				<div class="collapse navbar-collapse" id="navbarSupportedContent">
					<ul class="navbar-nav ms-auto">
						<!-- 未ログインであれば表示する -->
						<li class="nav-item" sec:authorize="isAnonymous()">
							<a class="nav-link" th:href="@{/login}">ログイン</a>
						</li>
						<li class="nav-item" sec:authorize="isAnonymous()">
							<a class="nav-link" th:href="@{/signup}">会員登録</a>
						</li>


						<!-- ログイン済みであれば表示する -->
						<li class="nav-item dropdown" sec:authorize="hasRole('ROLE_GENERAL')">


							<a id="navbarDropdownGeneral" class="nav-link dropdown-toggle" href="#" role="button"
								data-bs-toggle="dropdown" aria-haspopup="true" aria-expanded="false" v-pre>
								<span sec:authentication="principal.user.name"></span>
							</a>

							<div class="dropdown-menu dropdown-menu-end" aria-labelledby="navbarDropdownGeneral">
								<!--共通-->
								<a class="dropdown-item nagoyameshi-dropdown-item" th:href="@{/user}">会員情報</a>
								<!--有料会員のみ-->
								<div sec:authorize="isAuthenticated()"
									th:if="${#authentication.principal.user.membershipType == 1}">

									<a class="dropdown-item nagoyameshi-dropdown-item"
										th:href="@{/shops/reservations}">予約一覧</a>
									<a class="dropdown-item nagoyameshi-dropdown-item"
										th:href="@{/favorites}">お気に入り一覧</a>
								</div>

								<div class="dropdown-divider"></div>
								<a class="dropdown-item nagoyameshi-dropdown-item" th:href="@{/logout}"
									onclick="event.preventDefault(); document.getElementById('logout-form').submit();">
									ログアウト
								</a>
								<form class="d-none" id="logout-form" th:action="@{/logout}" method="post"></form>
							</div>
						</li>


						<!-- 管理者であれば表示する -->
						<li class="nav-item dropdown" sec:authorize="hasRole('ROLE_ADMIN')">

						    <a id="navbarDropdownAdmin"
						       class="nav-link dropdown-toggle"
						       href="#"
						       role="button"
						       data-bs-toggle="dropdown"
						       aria-expanded="false">

						        <i class="bi bi-speedometer2 me-1"></i>
						        管理画面

						    </a>

						    <div class="dropdown-menu dropdown-menu-end"
						         aria-labelledby="navbarDropdownAdmin">

						        <!-- ダッシュボード -->
						        <a class="dropdown-item nagoyameshi-dropdown-item"
						           th:href="@{/admin}">
						            <i class="bi bi-speedometer2 me-2"></i>
						            ダッシュボード
						        </a>

						        <div class="dropdown-divider"></div>

						        <!-- 管理 -->
						        <a class="dropdown-item nagoyameshi-dropdown-item"
						           th:href="@{/admin/users}">
						            <i class="bi bi-people-fill me-2"></i>
						            会員管理
						        </a>

						        <a class="dropdown-item nagoyameshi-dropdown-item"
						           th:href="@{/admin/shops}">
						            <i class="bi bi-shop me-2"></i>
						            店舗管理
						        </a>

						        <a class="dropdown-item nagoyameshi-dropdown-item"
						           th:href="@{/admin/categories}">
						            <i class="bi bi-tags-fill me-2"></i>
						            カテゴリ管理
						        </a>

						        <div class="dropdown-divider"></div>

						        <!-- 運営 -->
						        <a class="dropdown-item nagoyameshi-dropdown-item"
						           th:href="@{/admin/reservations}">
						            <i class="bi bi-calendar-check-fill me-2"></i>
						            予約管理
						        </a>

						        <a class="dropdown-item nagoyameshi-dropdown-item"
						           th:href="@{/admin/reviews}">
						            <i class="bi bi-star-fill me-2"></i>
						            レビュー管理
						        </a>

						        <a class="dropdown-item nagoyameshi-dropdown-item"
						           th:href="@{/admin/users/statistics}">
						            <i class="bi bi-bar-chart-fill me-2"></i>
						            会員集計
						        </a>

						        <div class="dropdown-divider"></div>

						        <!-- アカウント -->
						        <a class="dropdown-item nagoyameshi-dropdown-item"
						           th:href="@{/admin/profile}">
						            <i class="bi bi-person-circle me-2"></i>
						            管理者プロフィール
						        </a>

						        <div class="dropdown-divider"></div>

						        <!-- ログアウト -->
						        <a class="dropdown-item nagoyameshi-dropdown-item"
						           th:href="@{/logout}"
						           onclick="event.preventDefault();
						                    document.getElementById('logout-form').submit();">

						            <i class="bi bi-box-arrow-right me-2"></i>
						            ログアウト

						        </a>

						        <form class="d-none"
						              id="logout-form"
						              th:action="@{/logout}"
						              method="post">
						        </form>

						    </div>

						</li>
					</ul>
				</div>
			</div>
		</nav>
	</div>


	<!-- フッターの部品化 -->
	<div th:fragment="footer" th:remove="tag">
		<footer class="bg-light py-4 text-center">
		    <div class="mb-3">
		        <a th:href="@{/company}" class="text-secondary text-decoration-none mx-3">会社概要</a>
		        <a th:href="@{/terms}" class="text-secondary text-decoration-none mx-3">利用規約</a>
		    </div>

		    <p class="text-muted small mb-0">&copy; NAGOYAMESHI All rights reserved.</p>
		</footer>
	</div>

	<!-- script要素の部品化 -->
	<div th:fragment="scripts" th:remove="tag">
		<!-- Bootstrap -->
		<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"
			integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4"
			crossorigin="anonymous"></script>
	</div>
</body>

</html>
