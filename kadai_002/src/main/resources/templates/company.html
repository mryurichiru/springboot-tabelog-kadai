<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
	<div th:replace="~{fragment :: meta}"></div>

	<div th:replace="~{fragment :: styles}"></div>

	<title>会員情報</title>
</head>

<body>
	<div class="nagoyameshi-wrapper">
		<!-- ヘッダー -->
		<div th:replace="~{fragment :: header}"></div>

		<main>
			<div class="container nagoyameshi-container pb-5">
				<nav class="my-3" style="--bs-breadcrumb-divider: '>';" aria-label="breadcrumb">
					<ol class="breadcrumb mb-0">
						<li class="breadcrumb-item"><a th:href="@{/}">ホーム</a></li>
						<li class="breadcrumb-item active" aria-current="page">会社概要</li>
					</ol>
				</nav>

				<div class="row justify-content-center">
					<div class="col-md-8 col-lg-6">
						<h1 class="mb-4 text-center">会社概要</h1>

						<table class="table table-bordered align-middle">
							<tbody>
								<tr>
									<th class="table-light" style="width: 30%;">会社名</th>
									<td>株式会社 NAGOYAMESHI</td>
								</tr>

								<tr>
									<th class="table-light">所在地</th>
									<td>〒460-0008 愛知県名古屋市中区栄 X-X-X</td>
								</tr>
								<tr>
									<th class="table-light">代表者</th>
									<td>名古屋 太郎</td>
								</tr>
								<tr>
									<th class="table-light">設立</th>
									<td>2026年3月</td>
								</tr>
								<tr>
									<th class="table-light">資本金</th>
									<td>110,000千円</td>
								</tr>
								<tr>
									<th class="table-light">事業内容</th>
									<td>名古屋めし専門の飲食店検索・予約サービスの運営</td>
								</tr>
								<tr>
									<th class="table-light">従業員数</th>
									<td>15名</td>
								</tr>
							</tbody>
						</table>
					</div>
				</div>
			</div>
		</main>


		<!-- フッター -->
		<div th:replace="~{fragment :: footer}"></div>
	</div>

	<div th:replace="~{fragment :: scripts}"></div>
</body>

</html>
