<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org">

<head>
	<div th:replace="~{fragment :: meta}"></div>
	<div th:replace="~{fragment :: styles}"></div>
	<title>パスワードリセット</title>
</head>

<body>

	<div class="nagoyameshi-wrapper">

		<div th:replace="~{fragment :: header}"></div>

		<main>

			<div class="container py-5 nagoyameshi-container">

				<div class="row justify-content-center">

					<div class="col-lg-6">

						<div class="card shadow-sm">

							<div class="card-header">
								<h3 class="mb-0">パスワードリセット</h3>
							</div>

							<div class="card-body">

								<p class="text-muted mb-4">

									登録済みのメールアドレスを入力してください。<br>
									パスワード再設定用のメールを送信します。

								</p>

								<form th:action="@{/password/reset/send}"
								      th:object="${passwordResetRequestForm}"
								      method="post">

									<div class="mb-3">

										<label class="form-label">メールアドレス</label>

										<input type="email" class="form-control" th:field="*{email}">

										<div class="text-danger small" th:errors="*{email}">
										</div>

									</div>

									<div class="text-center">

										<button type="submit" class="btn nagoyameshi-btn text-white">

											メール送信

										</button>

									</div>

								</form>

							</div>

						</div>

					</div>

				</div>

			</div>

		</main>

		<div th:replace="~{fragment :: footer}"></div>

	</div>

	<div th:replace="~{fragment :: scripts}"></div>

</body>

</html>
