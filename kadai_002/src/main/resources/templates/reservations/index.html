<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org" xmlns:sec="https://www.thymeleaf.org/extras/spring-security">

<head>
	<div th:replace="~{fragment :: meta}"></div>
	<div th:replace="~{fragment :: styles}"></div>

	<title>予約一覧</title>
</head>

<body>
	<div class="nagoyameshi-wrapper">

		<!-- ヘッダー -->
		<div th:replace="~{fragment :: header}"></div>

		<main>
			<div class="container pt-4 pb-5 nagoyameshi-container">

				<h1 class="mb-4">予約一覧</h1>

				<div th:if="${reservationPage.isEmpty()}">

					<div class="alert alert-info">
						予約はまだありません。
					</div>

				</div>

				<div th:unless="${reservationPage.isEmpty()}">

					<div class="card shadow-sm mb-3" th:each="reservation : ${reservationPage.content}">

						<div class="card-body">

							<div class="row align-items-center">

								<!-- 左側 -->
								<div class="col-md-6">

									<h5 class="mb-3" th:text="${reservation.shop.name}">
									</h5>

									<p class="mb-1">
										<strong>予約日時：</strong>

										<span th:text="${#temporals.format(
					                        reservation.reservationDatetime,
					                        'yyyy/MM/dd HH:mm')}">
										</span>
									</p>

									<p class="mb-0">
										<strong>人数：</strong>

										<span th:text="${reservation.numberOfPeople}">
										</span>名
									</p>

								</div>

								<!-- ステータス -->
								<div class="col-md-2 text-center">

									<span class="badge bg-success px-3 py-2"
										th:if="${reservation.status.name() == 'CONFIRMED'}">

										予約済

									</span>

									<span class="badge bg-secondary px-3 py-2"
										th:if="${reservation.status.name() == 'CANCELLED'}">

										キャンセル済

									</span>

								</div>

								<!-- キャンセル -->
								<div class="col-md-2 text-center">

									<form method="post" th:if="${reservation.status.name() == 'CONFIRMED'}"
										th:action="@{/shops/reservations/{id}/cancel(id=${reservation.id})}">

										<button type="submit" class="btn btn-danger btn-sm"
											onclick="return confirm('本当に予約をキャンセルしますか？');">

											キャンセル

										</button>

									</form>

								</div>

								<!-- 店舗詳細 -->
								<div class="col-md-2 text-center">

									<a th:href="@{/shops/{id}(id=${reservation.shop.id})}"
										class="btn btn-outline-secondary btn-sm">

										店舗詳細

									</a>

								</div>

							</div>

						</div>

					</div>

					<!-- ページネーション -->
					<nav th:if="${reservationPage.totalPages > 1}">
						<ul class="pagination justify-content-center">

							<li class="page-item" th:classappend="${reservationPage.first} ? 'disabled'">

								<a class="page-link"
									th:href="@{/shops/reservations(page=${reservationPage.number - 1})}">

									＜

								</a>
							</li>

							<li class="page-item" th:each="i : ${#numbers.sequence(0, reservationPage.totalPages - 1)}"
								th:classappend="${i == reservationPage.number} ? 'active'">

								<a class="page-link" th:href="@{/shops/reservations(page=${i})}" th:text="${i + 1}">
								</a>

							</li>

							<li class="page-item" th:classappend="${reservationPage.last} ? 'disabled'">

								<a class="page-link"
									th:href="@{/shops/reservations(page=${reservationPage.number + 1})}">

									＞

								</a>
							</li>

						</ul>
					</nav>

				</div>

			</div>
		</main>

		<!-- フッター -->
		<div th:replace="~{fragment :: footer}"></div>

	</div>
	<div th:replace="~{fragment :: scripts}"></div>
</body>

</html>
