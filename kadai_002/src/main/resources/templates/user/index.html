<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
	<div th:replace="~{fragment :: meta}"></div>

	<div th:replace="~{fragment :: styles}"></div>

	<title>会員情報</title>
</head>

<body>
	<div class="nagoyameshi-wrapper">
		<!-- ヘッダー -->
		<div th:replace="~{fragment :: header}"></div>

		<main>
			<div class="container pb-5 nagoyameshi-container">
				<div class="row justify-content-center">
					<div class="col-xl-5 col-lg-6 col-md-8">
						<nav class="my-3" style="--bs-breadcrumb-divider: '>';" aria-label="breadcrumb">
							<ol class="breadcrumb mb-0">
								<li class="breadcrumb-item"><a th:href="@{/}">ホーム</a></li>
								<li class="breadcrumb-item active" aria-current="page">会員情報</li>
							</ol>
						</nav>

						<h1 class="mb-3 text-center">会員情報</h1>
						<td th:switch="${user.membershipType}">
							<span th:case="${T(com.example.entity.User).FREE_MEMBER}">
								<span class="badge bg-secondary fs-6 px-3 py-2">無料会員</span>
							</span>

							<span th:case="${T(com.example.entity.User).PAID_MEMBER}">
								<span class="badge bg-warning text-dark fs-6 px-3 py-2">有料会員</span>
							</span>
						</td>

						<div class="d-flex justify-content-end align-items-end mb-3">
							<div>
								<a th:href="@{/user/edit}">編集</a>
							</div>
						</div>

						<div th:if="${successMessage}" class="alert alert-info mb-4">
							<span th:text="${successMessage}"></span>
						</div>


						<div class="container mb-4">
							<div class="row pb-2 mb-2 border-bottom">
								<div class="col-4">
									<span class="fw-bold">氏名</span>
								</div>

								<div class="col">
									<span th:text="${user.getName()}"></span>
								</div>
							</div>

							<div class="row pb-2 mb-2 border-bottom">
								<div class="col-4">
									<span class="fw-bold">フリガナ</span>
								</div>

								<div class="col">
									<span th:text="${user.getFurigana()}"></span>
								</div>
							</div>


							<div class="row pb-2 mb-2 border-bottom">
								<div class="col-4">
									<span class="fw-bold">メールアドレス</span>
								</div>

								<div class="col">
									<span th:text="${user.getEmail()}"></span>
								</div>
							</div>

							<div class="row pb-2 mb-2 border-bottom">
								<div class="col-4">
									<span class="fw-bold">電話番号</span>
								</div>

								<div class="col">
									<span th:text="${user.getPhoneNumber()}"></span>
								</div>
							</div>

							<div class="row pb-2 mb-2 border-bottom">
								<div class="col-4">
									<span class="fw-bold">生年月日</span>
								</div>

								<div class="col">
									<span th:text="${user.getDateOfBirth()}"></span>
								</div>
							</div>

							<div class="row pb-2 mb-2 border-bottom">
								<div class="col-4">
									<span class="fw-bold">職業</span>
								</div>

								<div class="col">
									<span th:text="${user.getOccupation()}"></span>
								</div>
							</div>


						</div>
						<div class="d-flex flex-column gap-3 mt-4">

							<!-- パスワード変更 -->
							<a th:href="@{/user/password/edit}" class="btn btn-outline-primary">
								パスワード変更
							</a>

							<!-- 有料会員登録 -->
							<a th:if="${user.membershipType == 0}" th:href="@{/subscription/create}"
								class="btn btn-outline-warning">
								有料会員登録
							</a>
							
							<!--契約内容変更-->
							<a th:if="${user.membershipType == 1}"th:href="@{/subscription/portal}" class="btn btn-outline-primary">
								契約内容を管理する
							</a>

							<!-- 退会 -->
							<a th:href="@{/user/delete}" class="btn btn-outline-danger">
								退会する
							</a>

						</div>
					</div>
				</div>
			</div>
		</main>

		<!-- フッター -->
		<div th:replace="~{fragment :: footer}"></div>
	</div>

	<div th:replace="~{fragment :: scripts}"></div>
</body>

</html>
